---
- name: Wait for containerd CRI to be responsive
  ansible.builtin.command:
    cmd: crictl --runtime-endpoint unix:///run/containerd/containerd.sock info
  register: crictl_check
  retries: 10
  delay: 5
  until: crictl_check.rc == 0
  changed_when: false

- name: Run kubeadm init
  ansible.builtin.command:
    cmd: >
      kubeadm init
      --pod-network-cidr=192.168.0.0/16
      --apiserver-advertise-address={{ ansible_default_ipv4.address }}
      --cri-socket=unix:///run/containerd/containerd.sock
    creates: /etc/kubernetes/admin.conf

- name: Create .kube directory for ubuntu user
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy admin.conf to ubuntu user kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Install Calico CNI operator
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.0/manifests/tigera-operator.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Install Calico custom resources
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.0/manifests/custom-resources.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Generate kubeadm join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: kubeadm_join_cmd
  changed_when: false

- name: Store join command as a host fact for workers
  ansible.builtin.set_fact:
    kubeadm_join: "{{ kubeadm_join_cmd.stdout }}"

# ── EFS CSI Driver ────────────────────────────────────────────────────────────
# Installed here (cluster bootstrap phase) so the efs-sc StorageClass and
# postgres PVC created in the postgres role have a working provisioner.

- name: Install Helm
  ansible.builtin.shell:
    cmd: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    creates: /usr/local/bin/helm

- name: Add EFS CSI driver Helm repo
  ansible.builtin.command:
    cmd: helm repo add aws-efs-csi-driver https://kubernetes-sigs.github.io/aws-efs-csi-driver/
  changed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Install EFS CSI driver
  ansible.builtin.command:
    cmd: >
      helm upgrade --install aws-efs-csi-driver aws-efs-csi-driver/aws-efs-csi-driver
      --namespace kube-system
      --wait
      --timeout 5m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true
