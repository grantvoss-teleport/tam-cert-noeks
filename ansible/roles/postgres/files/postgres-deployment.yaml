apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      initContainers:
        # Copy certs from read-only Secret volume to an emptyDir and fix
        # permissions — postgres requires server.key to be owned by UID 999
        # and not world-readable. Runs as root briefly, then drops to 999.
        - name: fix-cert-permissions
          image: busybox
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /certs-ro/ca.crt /certs/ca.crt
              cp /certs-ro/server.crt /certs/server.crt
              cp /certs-ro/server.key /certs/server.key
              chown 999:999 /certs/ca.crt /certs/server.crt /certs/server.key
              chmod 600 /certs/server.key
              chmod 644 /certs/ca.crt /certs/server.crt
          volumeMounts:
            - name: certs-ro
              mountPath: /certs-ro
              readOnly: true
            - name: certs-rw
              mountPath: /certs
      containers:
        - name: postgres
          image: ateleport/test:postgres-wal2json-17-1
          # args are appended by the official image entrypoint AFTER initdb
          # so config_file and hba_file are applied to the running server
          args:
            - "-c"
            - "config_file=/etc/postgresql/postgresql.conf"
            - "-c"
            - "hba_file=/etc/postgresql/pg_hba.conf"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: certs-rw
              mountPath: /certs
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: pg-hba-config
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: certs-ro
          secret:
            secretName: postgres-certs
        - name: certs-rw
          emptyDir: {}
        - name: postgres-config
          configMap:
            name: postgres-config
        - name: pg-hba-config
          configMap:
            name: pg-hba-config
        - name: init-sql
          configMap:
            name: init-sql
