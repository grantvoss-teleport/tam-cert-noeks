---
- name: Source environment vars file
  ansible.builtin.shell:
    cmd: source /home/ubuntu/.teleport-env && env
    executable: /bin/bash
  register: env_vars
  changed_when: false

- name: Get Teleport OIDC role ARN from env file
  ansible.builtin.set_fact:
    teleport_oidc_role_arn: "{{ env_vars.stdout | regex_search('TELEPORT_OIDC_ROLE_ARN=(.+)', '\\1') | first | default('') }}"

- name: Wait for Teleport auth to be ready
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Get auth pod name
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod
  changed_when: false

- name: Write AWS OIDC integration manifest
  ansible.builtin.copy:
    dest: /tmp/teleport-oidc-integration.yaml
    mode: "0600"
    content: |
      kind: integration
      sub_kind: aws-oidc
      version: v1
      metadata:
        name: grant-tam-teleport-integration
      spec:
        aws_oidc:
          role_arn: "{{ teleport_oidc_role_arn }}"

- name: Create OIDC integration ConfigMap
  ansible.builtin.shell:
    cmd: |
      kubectl create configmap oidc-integration -n teleport \
        --from-file=integration.yaml=/tmp/teleport-oidc-integration.yaml \
        --dry-run=client -o yaml | kubectl apply -f -
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Patch auth deployment to mount OIDC integration ConfigMap
  ansible.builtin.shell:
    cmd: |
      kubectl patch deployment teleport-auth -n teleport --type=json -p='[
        {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"oidc-integration","configMap":{"name":"oidc-integration"}}},
        {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"oidc-integration","mountPath":"/tmp/oidc-integration","readOnly":true}}
      ]'
      kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Get auth pod name after rollout
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod_after
  changed_when: false

- name: Create AWS OIDC integration via tctl
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod_after.stdout }} --
      tctl create -f /tmp/oidc-integration/integration.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: tctl_result
  failed_when:
    - tctl_result.rc != 0
    - '"already exists" not in tctl_result.stderr'
  changed_when: tctl_result.rc == 0

- name: Cleanup OIDC integration volume and ConfigMap
  ansible.builtin.shell:
    cmd: |
      VOL_IDX=$(kubectl get deployment teleport-auth -n teleport \
        -o jsonpath='{range .spec.template.spec.volumes[*]}{.name}{"\n"}{end}' | \
        awk '/^oidc-integration$/{print NR-1; exit}')
      MOUNT_IDX=$(kubectl get deployment teleport-auth -n teleport \
        -o jsonpath='{range .spec.template.spec.containers[0].volumeMounts[*]}{.name}{"\n"}{end}' | \
        awk '/^oidc-integration$/{print NR-1; exit}')
      kubectl patch deployment teleport-auth -n teleport --type=json \
        -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/volumeMounts/${MOUNT_IDX}\"},{\"op\":\"remove\",\"path\":\"/spec/template/spec/volumes/${VOL_IDX}\"}]"
      kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
      kubectl delete configmap oidc-integration -n teleport
      rm -f /tmp/teleport-oidc-integration.yaml
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Get auth pod name after cleanup
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod_final
  changed_when: false

- name: Verify integration was created
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod_final.stdout }}
      -- tctl get integration/grant-tam-teleport-integration
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  register: integration_result

- name: Print integration status
  ansible.builtin.debug:
    msg: "{{ integration_result.stdout_lines }}"
