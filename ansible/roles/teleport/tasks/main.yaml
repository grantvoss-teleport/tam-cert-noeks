---
# teleport/tasks/main.yaml

- name: Source environment vars file
  ansible.builtin.shell:
    cmd: source /home/ubuntu/.teleport-env && env
    executable: /bin/bash
  register: env_vars
  changed_when: false

- name: Set facts from env file
  ansible.builtin.set_fact:
    sessions_bucket:     "{{ env_vars.stdout | regex_search('SESSIONS_BUCKET=(.+)', '\\1') | first }}"
    license_secret_name: "{{ env_vars.stdout | regex_search('LICENSE_SECRET_NAME=(.+)', '\\1') | first | default('grant-tam/teleport/license') }}"

- name: Fetch Teleport license from Secrets Manager
  ansible.builtin.command:
    cmd: aws secretsmanager get-secret-value --secret-id {{ license_secret_name }} --region us-west-2 --query SecretString --output text
  register: license_result
  changed_when: false

- name: Set Teleport license fact
  ansible.builtin.set_fact:
    teleport_license: "{{ license_result.stdout }}"

- name: Install Helm
  ansible.builtin.shell:
    cmd: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    creates: /usr/local/bin/helm

- name: Add Teleport Helm repo
  ansible.builtin.command:
    cmd: helm repo add teleport https://charts.releases.teleport.dev
  changed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Create teleport namespace
  ansible.builtin.command:
    cmd: kubectl create namespace teleport
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  changed_when: ns_result.rc == 0
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Create Teleport license secret
  ansible.builtin.shell:
    cmd: |
      kubectl create secret generic license \
        --namespace teleport \
        --from-literal=license.pem="{{ teleport_license }}" \
        --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Template Teleport Helm values
  ansible.builtin.template:
    src: teleport-values.yaml.j2
    dest: /home/ubuntu/teleport-values.yaml
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Install Teleport via Helm
  ansible.builtin.command:
    cmd: >
      helm upgrade --install teleport teleport/teleport-cluster
      --namespace teleport
      --version 18.7.3
      --values /home/ubuntu/teleport-values.yaml
      --wait
      --timeout 10m
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Wait for Teleport auth rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/teleport-auth -n teleport --timeout=300s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  ignore_errors: true

# ── Pin NodePort to 32443 ─────────────────────────────────────────────────────
# The Teleport Helm chart does not support setting a specific nodePort value
# via values (known upstream limitation — port is hardcoded as 443 in template).
# We use a strategic merge patch that finds the tls port entry by name and sets
# its nodePort explicitly. This survives helm upgrade as long as the service
# spec does not change type.

- name: Install jq
  ansible.builtin.apt:
    name: jq
    state: present
    update_cache: false
  become: true

- name: Get current tls port index in service
  ansible.builtin.shell:
    cmd: |
      kubectl get svc teleport -n teleport -o json | \
        jq '[.spec.ports[] | .name] | index("tls")'
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: tls_port_index
  changed_when: false

- name: Pin tls NodePort to 32443
  ansible.builtin.shell:
    cmd: |
      kubectl patch svc teleport -n teleport \
        --type='json' \
        -p="[{\"op\":\"replace\",\"path\":\"/spec/ports/{{ tls_port_index.stdout }}/nodePort\",\"value\":32443}]"
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Verify NodePort is 32443
  ansible.builtin.command:
    cmd: >
      kubectl get svc teleport -n teleport
      -o jsonpath='{.spec.ports[?(@.name=="tls")].nodePort}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: nodeport_check
  changed_when: false

- name: Print NodePort assignment
  ansible.builtin.debug:
    msg: "Teleport proxy NodePort: {{ nodeport_check.stdout }} (expected: 32443)"

- name: Get Teleport pod status
  ansible.builtin.command:
    cmd: kubectl get pods -n teleport
  register: teleport_pods
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Print Teleport pod status
  ansible.builtin.debug:
    msg: "{{ teleport_pods.stdout_lines }}"
