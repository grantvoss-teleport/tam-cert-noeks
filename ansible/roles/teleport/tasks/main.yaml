---
# teleport/tasks/main.yaml
# Installs Teleport Enterprise via Helm using IAM authentication for RDS.
# No passwords stored anywhere — all RDS connections use IAM auth tokens
# generated from the EC2 instance role via aws rds generate-db-auth-token.

- name: Source environment vars file
  ansible.builtin.shell:
    cmd: source /home/ubuntu/.teleport-env && env
    executable: /bin/bash
  register: env_vars
  changed_when: false

- name: Set facts from env file
  ansible.builtin.set_fact:
    rds_address:         "{{ env_vars.stdout | regex_search('RDS_ADDRESS=(.+)', '\\1') | first }}"
    sessions_bucket:     "{{ env_vars.stdout | regex_search('SESSIONS_BUCKET=(.+)', '\\1') | first }}"
    license_secret_name: "{{ env_vars.stdout | regex_search('LICENSE_SECRET_NAME=(.+)', '\\1') | first | default('grant-tam/teleport/license') }}"

- name: Fetch Teleport license from Secrets Manager
  ansible.builtin.command:
    cmd: aws secretsmanager get-secret-value --secret-id {{ license_secret_name }} --region us-west-2 --query SecretString --output text
  register: license_result
  changed_when: false

- name: Set Teleport license fact
  ansible.builtin.set_fact:
    teleport_license: "{{ license_result.stdout }}"

# ── RDS IAM user bootstrap ────────────────────────────────────────────────────
# Uses aws rds generate-db-auth-token to obtain a short-lived IAM auth token
# for the teleport_admin master user. This token is used only to create the
# 'teleport' IAM user and grant it rds_iam. No password is stored anywhere.

- name: Install psql client
  ansible.builtin.apt:
    name: postgresql-client
    state: present
    update_cache: true
  become: true

- name: Wait for RDS to be reachable
  ansible.builtin.wait_for:
    host: "{{ rds_address }}"
    port: 5432
    timeout: 120

- name: Generate IAM auth token for teleport_admin
  ansible.builtin.command:
    cmd: >
      aws rds generate-db-auth-token
      --hostname {{ rds_address }}
      --port 5432
      --username teleport_admin
      --region us-west-2
  register: rds_iam_token
  changed_when: false
  no_log: true

- name: Download RDS CA bundle
  ansible.builtin.get_url:
    url: https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem
    dest: /tmp/rds-ca.pem
    mode: "0644"

- name: Create teleport IAM DB user and grant rds_iam role
  ansible.builtin.shell:
    cmd: |
      export PGPASSWORD="{{ rds_iam_token.stdout }}"
      export PGSSLROOTCERT=/tmp/rds-ca.pem
      export PGSSLMODE=verify-full

      # Create teleport user if it doesn't exist
      psql "postgresql://teleport_admin@{{ rds_address }}:5432/teleport_backend" \
        -c "DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'teleport') THEN
                CREATE USER teleport;
              END IF;
            END
            \$\$;"

      # Grant IAM auth role so Teleport can connect via token
      psql "postgresql://teleport_admin@{{ rds_address }}:5432/teleport_backend" \
        -c "GRANT rds_iam TO teleport;"

      # Grant full access to backend DB
      psql "postgresql://teleport_admin@{{ rds_address }}:5432/teleport_backend" \
        -c "GRANT ALL PRIVILEGES ON DATABASE teleport_backend TO teleport;"

      # Create audit DB if missing
      psql "postgresql://teleport_admin@{{ rds_address }}:5432/postgres" \
        -c "SELECT 'CREATE DATABASE teleport_audit' \
            WHERE NOT EXISTS \
            (SELECT FROM pg_database WHERE datname = 'teleport_audit')\gexec"

      # Grant access to audit DB
      psql "postgresql://teleport_admin@{{ rds_address }}:5432/teleport_audit" \
        -c "GRANT ALL PRIVILEGES ON DATABASE teleport_audit TO teleport;"
    executable: /bin/bash
  no_log: true
  changed_when: true

# ── Helm install ──────────────────────────────────────────────────────────────

- name: Install Helm
  ansible.builtin.shell:
    cmd: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    creates: /usr/local/bin/helm

- name: Add Teleport Helm repo
  ansible.builtin.command:
    cmd: helm repo add teleport https://charts.releases.teleport.dev
  changed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: Create teleport namespace
  ansible.builtin.command:
    cmd: kubectl create namespace teleport
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  changed_when: ns_result.rc == 0
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Create Teleport license secret
  ansible.builtin.shell:
    cmd: |
      kubectl create secret generic license \
        --namespace teleport \
        --from-literal=license.pem="{{ teleport_license }}" \
        --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Template Teleport Helm values
  ansible.builtin.template:
    src: teleport-values.yaml.j2
    dest: /home/ubuntu/teleport-values.yaml
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Install Teleport via Helm
  ansible.builtin.command:
    cmd: >
      helm upgrade --install teleport teleport/teleport-cluster
      --namespace teleport
      --version 18.7.1
      --values /home/ubuntu/teleport-values.yaml
      --wait
      --timeout 10m
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Wait for Teleport auth rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/teleport-auth -n teleport --timeout=300s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  ignore_errors: true

- name: Pin Teleport NodePort to 32443
  ansible.builtin.command:
    cmd: >
      kubectl patch svc teleport -n teleport
      --type='json'
      -p='[{"op":"replace","path":"/spec/ports/0/nodePort","value":32443}]'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true
  ignore_errors: true

- name: Pin Teleport healthCheckNodePort to 32444
  ansible.builtin.command:
    cmd: >
      kubectl patch svc teleport -n teleport
      -p='{"spec":{"healthCheckNodePort":32444}}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true
  ignore_errors: true

- name: Get Teleport pod status
  ansible.builtin.command:
    cmd: kubectl get pods -n teleport
  register: teleport_pods
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Print Teleport pod status
  ansible.builtin.debug:
    msg: "{{ teleport_pods.stdout_lines }}"
