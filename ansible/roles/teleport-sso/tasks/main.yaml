---
# teleport-sso/tasks/main.yaml
#
# Bootstrap-only: creates the Auth0 OIDC connector so the cluster has a working
# SSO connector before the Machine ID GitHub Actions workflow takes over.
#
# What this role does NOT do (handled by GitHub Actions + Machine ID):
#   - Patching the connector with the base role wildcard mapping
#   - Setting cluster_auth_preference (auth type / default connector)
# Those are managed by .github/workflows/teleport-rbac.yml via tbot/tctl
# so that all auth config changes go through the same audited, secretless path.
# cluster_auth_preference initial state is also set via Helm values at boot.
#
# Auth0 prerequisite: an Auth0 Action must be configured to emit a "groups" claim:
#   exports.onExecutePostLogin = async (event, api) => {
#     api.idToken.setCustomClaim('groups', event.authorization?.roles ?? []);
#     api.accessToken.setCustomClaim('groups', event.authorization?.roles ?? []);
#   };

- name: Get auth pod name
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod
  changed_when: false

# ─── Create initial Auth0 OIDC connector ─────────────────────────────────────
# Creates a bootstrap connector with editor + access mappings using only
# built-in Teleport roles (no custom roles exist yet at this step).
# The argocd role (step 11) updates this connector after ArgoCD has applied
# all custom roles, adding the base wildcard and okta_base mappings.
#
# Uses ConfigMap mount pattern — kubectl exec -i stdin truncates on distroless.

- name: Write bootstrap OIDC connector to temp file
  ansible.builtin.copy:
    dest: /tmp/oidc-auth0-bootstrap.yaml
    mode: "0600"
    content: |
      kind: oidc
      version: v3
      metadata:
        name: auth0
      spec:
        display: "Auth0"
        issuer_url: "{{ auth0_domain }}"
        client_id: "{{ auth0_client_id }}"
        client_secret: "{{ auth0_client_secret }}"
        redirect_url: "https://grant-tam-teleport.gvteleport.com/v1/webapi/oidc/callback"
        scope:
          - openid
          - profile
          - email
        claims_to_roles:
          - claim: "groups"
            value: "{{ auth0_groups_editor }}"
            roles:
              - editor
              - access
              - auditor
          - claim: "groups"
            value: "{{ auth0_groups_access }}"
            roles:
              - access

- name: Create bootstrap OIDC ConfigMap
  ansible.builtin.shell:
    cmd: |
      kubectl create configmap oidc-bootstrap -n teleport \
        --from-file=oidc-auth0-bootstrap.yaml=/tmp/oidc-auth0-bootstrap.yaml \
        --dry-run=client -o yaml | kubectl apply -f -
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Patch auth deployment to mount OIDC bootstrap ConfigMap
  ansible.builtin.shell:
    cmd: |
      kubectl patch deployment teleport-auth -n teleport --type=json -p='[
        {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"oidc-bootstrap","configMap":{"name":"oidc-bootstrap"}}},
        {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"oidc-bootstrap","mountPath":"/tmp/oidc-bootstrap","readOnly":true}}
      ]'
      kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Get auth pod name after rollout
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod_after
  changed_when: false

- name: Create initial Auth0 OIDC connector via tctl
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod_after.stdout }} --
      tctl create -f /tmp/oidc-bootstrap/oidc-auth0-bootstrap.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: oidc_result
  failed_when:
    - oidc_result.rc != 0
    - '"already exists" not in oidc_result.stderr'
  changed_when: oidc_result.rc == 0

- name: Cleanup OIDC bootstrap volume and ConfigMap
  ansible.builtin.shell:
    cmd: |
      VOL_IDX=$(kubectl get deployment teleport-auth -n teleport \
        -o jsonpath='{range .spec.template.spec.volumes[*]}{.name}{"\n"}{end}' | \
        awk '/^oidc-bootstrap$/{print NR-1; exit}')
      MOUNT_IDX=$(kubectl get deployment teleport-auth -n teleport \
        -o jsonpath='{range .spec.template.spec.containers[0].volumeMounts[*]}{.name}{"\n"}{end}' | \
        awk '/^oidc-bootstrap$/{print NR-1; exit}')
      kubectl patch deployment teleport-auth -n teleport --type=json \
        -p="[{\"op\":\"remove\",\"path\":\"/spec/template/spec/containers/0/volumeMounts/${MOUNT_IDX}\"},{\"op\":\"remove\",\"path\":\"/spec/template/spec/volumes/${VOL_IDX}\"}]"
      kubectl rollout status deployment/teleport-auth -n teleport --timeout=120s
      kubectl delete configmap oidc-bootstrap -n teleport
      rm -f /tmp/oidc-auth0-bootstrap.yaml
    executable: /bin/bash
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: true

- name: Get auth pod name after cleanup rollout
  ansible.builtin.command:
    cmd: >
      kubectl get pod -n teleport -l app.kubernetes.io/component=auth
      -o jsonpath='{.items[0].metadata.name}'
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: auth_pod_final
  changed_when: false

- name: Verify OIDC connector was created
  ansible.builtin.command:
    cmd: >
      kubectl exec -n teleport {{ auth_pod_final.stdout }}
      -- tctl get oidc/auth0
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false
  register: oidc_verify

- name: Print OIDC connector status
  ansible.builtin.debug:
    msg: "{{ oidc_verify.stdout_lines }}"

- name: Remind operator that full OIDC mapping is applied by argocd role
  ansible.builtin.debug:
    msg: >
      Bootstrap Auth0 OIDC connector created (built-in roles only).
      The argocd role (step 11) will update this connector with the full
      claims_to_roles mapping including base and okta_base after
      ArgoCD has applied all custom roles.
