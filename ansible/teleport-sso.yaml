---
- name: Configure Teleport Auth0 OIDC SSO
  hosts: master
  roles:
    - teleport-sso
  remote_user: ubuntu
  become: yes
  vars:
    # Auth0 tenant URL (e.g. https://your-tenant.auth0.com)
    auth0_domain: "{{ lookup('env', 'AUTH0_DOMAIN') }}"
    # Auth0 application credentials
    auth0_client_id: "{{ lookup('env', 'AUTH0_CLIENT_ID') }}"
    auth0_client_secret: "{{ lookup('env', 'AUTH0_CLIENT_SECRET') }}"
    # Auth0 role/group names to map to Teleport roles
    auth0_groups_editor: "{{ lookup('env', 'AUTH0_GROUPS_EDITOR') }}"
    auth0_groups_access: "{{ lookup('env', 'AUTH0_GROUPS_ACCESS') }}"
