name: Teleport RBAC

on:
  push:
    branches:
      - main
    paths:
      - 'ansible/roles/teleport-rbac/templates/role-*.yaml.j2'
      - 'ansible/roles/teleport-rbac/templates/login-rule-*.yaml.j2'
      - 'ansible/roles/teleport-rbac/templates/saml-okta-patch.yaml.j2'
      - 'ansible/roles/teleport-rbac/templates/cluster-auth-preference.yaml.j2'
      - '.github/workflows/teleport-rbac.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print resources without applying'
        required: false
        default: 'false'
        type: boolean

jobs:
  apply-rbac:
    name: Apply Teleport RBAC via Machine ID
    runs-on: ubuntu-latest

    # Required for GitHub OIDC token issuance (secretless join)
    permissions:
      id-token: write
      contents: read

    environment: production   # gates on manual approval (same env as Terraform)

    env:
      TELEPORT_PROXY: "grant-tam-teleport.gvteleport.com:443"
      TELEPORT_BOT_TOKEN: "rbac-github-bot-token"
      TELEPORT_CLUSTER: "grant-tam-teleport.gvteleport.com"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Install Teleport binaries (tbot + tctl) ──────────────────────────
      - name: Install Teleport
        uses: teleport-actions/setup@v1
        with:
          version: 18.7.1

      # ── Authenticate via Machine ID (GitHub OIDC → short-lived X.509) ───
      # tbot exchanges the GitHub Actions OIDC JWT for a Teleport certificate.
      # join-method: github must be explicit in Teleport 18.x — tbot no longer
      # infers it from the token name alone.
      - name: Authenticate with Teleport Machine ID
        uses: teleport-actions/auth@v2
        with:
          proxy: ${{ env.TELEPORT_PROXY }}
          token: ${{ env.TELEPORT_BOT_TOKEN }}
          join-method: github
          certificate-ttl: 10m
          anonymous-telemetry: 0

      # ── Render Jinja2 templates → plain YAML ────────────────────────────
      - name: Install jinja2-cli
        run: pip install jinja2-cli

      - name: Render RBAC templates
        env:
          OKTA_METADATA_URL: ${{ secrets.OKTA_METADATA_URL }}
          OKTA_GROUPS_EDITOR: ${{ secrets.OKTA_GROUPS_EDITOR }}
          OKTA_GROUPS_ACCESS:  ${{ secrets.OKTA_GROUPS_ACCESS }}
          TELEPORT_DOMAIN: "grant-tam-teleport.gvteleport.com"
        run: |
          mkdir -p /tmp/rbac-rendered

          render() {
            jinja2 "$1" \
              -D teleport_domain="${TELEPORT_DOMAIN}" \
              -D okta_metadata_url="${OKTA_METADATA_URL}" \
              -D okta_groups_editor="${OKTA_GROUPS_EDITOR}" \
              -D okta_groups_access="${OKTA_GROUPS_ACCESS}" \
              -o "$2"
          }

          render ansible/roles/teleport-rbac/templates/login-rule-okta-team.yaml.j2    /tmp/rbac-rendered/login-rule-okta-team.yaml
          render ansible/roles/teleport-rbac/templates/role-base.yaml.j2               /tmp/rbac-rendered/role-base.yaml
          render ansible/roles/teleport-rbac/templates/role-kube-access.yaml.j2        /tmp/rbac-rendered/role-kube-access.yaml
          render ansible/roles/teleport-rbac/templates/role-ssh-access.yaml.j2         /tmp/rbac-rendered/role-ssh-access.yaml
          render ansible/roles/teleport-rbac/templates/role-ssh-root-access.yaml.j2    /tmp/rbac-rendered/role-ssh-root-access.yaml
          render ansible/roles/teleport-rbac/templates/role-auto-approver.yaml.j2      /tmp/rbac-rendered/role-auto-approver.yaml
          render ansible/roles/teleport-rbac/templates/saml-okta-patch.yaml.j2         /tmp/rbac-rendered/saml-okta-patch.yaml
          render ansible/roles/teleport-rbac/templates/cluster_auth_preference.yaml.j2 /tmp/rbac-rendered/cluster-auth-preference.yaml

      # ── Dry-run: print rendered manifests without applying ───────────────
      - name: Dry run — print rendered manifests
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== DRY RUN — resources NOT applied ==="
          for f in /tmp/rbac-rendered/*.yaml; do
            echo ""
            echo "──── $f ────"
            cat "$f"
          done

      # ── Apply: tctl create -f for each resource ──────────────────────────
      - name: Apply Login Rule
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: tctl create -f /tmp/rbac-rendered/login-rule-okta-team.yaml

      - name: Apply role — base
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: tctl create -f /tmp/rbac-rendered/role-base.yaml

      - name: Apply role — kube-access
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: tctl create -f /tmp/rbac-rendered/role-kube-access.yaml

      - name: Apply role — ssh-access
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: tctl create -f /tmp/rbac-rendered/role-ssh-access.yaml

      - name: Apply role — ssh-root-access
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: tctl create -f /tmp/rbac-rendered/role-ssh-root-access.yaml

      - name: Apply role — auto-approver
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: tctl create -f /tmp/rbac-rendered/role-auto-approver.yaml

      - name: Apply SAML connector patch (adds base role wildcard)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: tctl create -f /tmp/rbac-rendered/saml-okta-patch.yaml

      - name: Apply cluster auth preference (Okta as default, MFA on, WebAuthn)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: tctl create -f /tmp/rbac-rendered/cluster-auth-preference.yaml

      # ── Verify ───────────────────────────────────────────────────────────
      - name: Verify applied resources
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "=== Roles ==="
          tctl get roles/base roles/kube-access roles/ssh-access roles/ssh-root-access roles/auto-approver roles/rbac-manager

          echo "=== Login Rules ==="
          tctl get login_rule/okta-team-trait

          echo "=== SAML Connector ==="
          tctl get saml/okta

          echo "=== Cluster Auth Preference ==="
          tctl get cluster_auth_preference
