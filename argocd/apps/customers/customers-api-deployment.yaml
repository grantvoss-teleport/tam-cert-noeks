apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers-api
  namespace: customers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customers-api
  template:
    metadata:
      labels:
        app: customers-api
    spec:
      containers:
        - name: customers-api
          image: gvteleport/customers-api:latest
          env:
            - name: DB_HOST
              value: mysql
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: root
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: database
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /customers
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /customers
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
